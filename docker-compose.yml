version: "3.9"

services:
  neo-search-worker:
    image: neo-search-worker:latest
    container_name: neo-search-worker
    restart: unless-stopped
    ports:
      - "3210:3210"
    environment:
      PORT: "3210"
      WORKER_SECRET: "${WORKER_SECRET}"
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3210/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
