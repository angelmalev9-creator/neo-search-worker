version: "3.9"

services:
  neo-search-worker:
    build: .
    image: neo-search-worker:latest
    container_name: neo-search-worker
    restart: unless-stopped
    ports:
      - "3210:3210"
    shm_size: "512mb" # Увеличено за по-стабилен браузър
    environment:
      - PORT=3210
      - WORKER_SECRET=${WORKER_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - BROWSER_TIMEOUT_MS=20000
    # НЕ добавяй volumes: - .:/app тук!
